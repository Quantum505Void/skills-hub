name: Build & Deploy to GitHub Pages

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 1 * * *'   # 每天 UTC 01:00（北京09:00）自动刷新数据
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch data & inject into HTML
        env:
          GH_TOKEN: ${{ secrets.SKILLS_HUB_TOKEN }}
        run: python3 build.py

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          publish_branch: gh-pages
          exclude_assets: '.github,.gitignore,.wrangler,build.py'
