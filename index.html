<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Skills Hub — OpenClaw Skills 导航</title>
  <style>
    :root {
      --bg: #0f1117; --surface: #1a1d27; --border: #2a2d3a;
      --accent: #6c63ff; --accent2: #00d4aa;
      --text: #e8e9f0; --muted: #8b8fa8;
      --tag-bg: #252837; --card-hover: #20233a;
      --local-border: #00d4aa44; --local-glow: rgba(0,212,170,0.12);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; min-height: 100vh; }

    /* Header */
    header { border-bottom: 1px solid var(--border); padding: 0 24px; display: flex; align-items: center; gap: 12px; height: 60px; position: sticky; top: 0; background: rgba(15,17,23,0.96); backdrop-filter: blur(12px); z-index: 100; }
    .logo { font-size: 18px; font-weight: 700; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; white-space: nowrap; }
    .search-wrap { flex: 1; max-width: 440px; position: relative; }
    .search-wrap input { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 8px 14px 8px 34px; color: var(--text); font-size: 14px; outline: none; transition: border-color 0.2s; }
    .search-wrap input:focus { border-color: var(--accent); }
    .search-wrap .si { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 14px; }
    .search-shortcut { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: var(--tag-bg); border-radius: 4px; padding: 1px 5px; font-size: 10px; color: var(--muted); pointer-events: none; }
    .hdr-right { margin-left: auto; display: flex; align-items: center; gap: 10px; }
    .stats-badge { color: var(--muted); font-size: 13px; white-space: nowrap; }
    .built-at { color: var(--muted); font-size: 11px; white-space: nowrap; }

    /* Source Tabs */
    .source-tabs { border-bottom: 1px solid var(--border); padding: 0 24px; display: flex; gap: 2px; overflow-x: auto; background: var(--bg); position: sticky; top: 60px; z-index: 90; }
    .source-tabs::-webkit-scrollbar { display: none; }
    .tab-btn { background: none; border: none; border-bottom: 2px solid transparent; color: var(--muted); font-size: 13px; padding: 10px 14px; cursor: pointer; white-space: nowrap; transition: all 0.2s; display: flex; align-items: center; gap: 6px; }
    .tab-btn:hover { color: var(--text); }
    .tab-btn.active { border-bottom-color: var(--accent); color: var(--text); }
    .tab-badge { background: var(--tag-bg); border-radius: 10px; padding: 1px 6px; font-size: 10px; color: var(--muted); }
    .tab-btn.active .tab-badge { background: rgba(108,99,255,0.2); color: var(--accent); }

    /* Layout */
    .container { max-width: 1360px; margin: 0 auto; padding: 20px 24px 80px; display: grid; grid-template-columns: 200px 1fr; gap: 24px; }
    @media (max-width: 768px) { .container { grid-template-columns: 1fr; padding-bottom: 100px; } .sidebar { display: none; } }

    /* Sidebar */
    .sidebar { position: sticky; top: 109px; height: fit-content; }
    .sidebar h3 { font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
    .filter-list { list-style: none; margin-bottom: 20px; }
    .filter-list li button { background: none; border: none; color: var(--muted); font-size: 13px; cursor: pointer; padding: 5px 8px; border-radius: 6px; width: 100%; text-align: left; transition: all 0.15s; display: flex; align-items: center; justify-content: space-between; gap: 4px; }
    .filter-list li button:hover { background: var(--tag-bg); color: var(--text); }
    .filter-list li button.active { background: var(--tag-bg); color: var(--accent); }
    .filter-count { font-size: 10px; color: var(--muted); background: var(--bg); border-radius: 8px; padding: 0 5px; }

    /* Grid */
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 14px; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 16px; cursor: pointer; transition: all 0.2s; display: flex; flex-direction: column; gap: 10px; }
    .card:hover { border-color: var(--accent); background: var(--card-hover); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(108,99,255,0.12); }
    .card.local { border-color: var(--local-border); background: linear-gradient(135deg, var(--surface) 0%, #0d1f1c 100%); }
    .card.local:hover { border-color: var(--accent2); box-shadow: 0 8px 24px var(--local-glow); }
    .card-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; }
    .card-name { font-size: 14px; font-weight: 600; line-height: 1.3; flex: 1; }
    .card-meta { display: flex; align-items: center; gap: 4px; flex-shrink: 0; flex-wrap: wrap; justify-content: flex-end; }
    .card-star { color: var(--muted); font-size: 11px; white-space: nowrap; }
    .source-pill { font-size: 10px; padding: 2px 6px; border-radius: 4px; font-weight: 500; white-space: nowrap; }
    .src-clawhub  { background: rgba(108,99,255,0.15); color: #9d97ff; }
    .src-github   { background: rgba(0,212,170,0.1);   color: #00d4aa; }
    .src-skillssh { background: rgba(255,80,120,0.12); color: #ff7fa8; }
    .src-local    { background: rgba(0,212,170,0.15);  color: #00d4aa; }
    .cat-badge { font-size: 10px; padding: 2px 6px; border-radius: 4px; background: var(--tag-bg); color: var(--muted); white-space: nowrap; }
    .card-summary { font-size: 12px; color: var(--muted); line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
    .card-footer { display: flex; align-items: center; gap: 8px; margin-top: auto; flex-wrap: wrap; }
    .card-slug { font-size: 11px; color: var(--accent2); font-family: monospace; background: rgba(0,212,170,0.08); padding: 2px 7px; border-radius: 4px; max-width: 180px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .card-installed { font-size: 11px; color: var(--accent2); }
    .card-dl { margin-left: auto; font-size: 11px; color: var(--muted); }
    .no-results { grid-column: 1/-1; text-align: center; color: var(--muted); padding: 60px; font-size: 14px; }

    /* Modal */
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 200; align-items: center; justify-content: center; padding: 24px; }
    .modal-overlay.open { display: flex; }
    .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; max-width: 560px; width: 100%; max-height: 85vh; overflow-y: auto; padding: 28px; position: relative; }
    .modal-close { position: absolute; top: 16px; right: 16px; background: var(--tag-bg); border: none; color: var(--muted); width: 28px; height: 28px; border-radius: 6px; cursor: pointer; font-size: 15px; display: flex; align-items: center; justify-content: center; }
    .modal-close:hover { color: var(--text); }
    .modal h2 { font-size: 18px; margin-bottom: 6px; padding-right: 36px; }
    .modal .slug { font-size: 12px; color: var(--accent2); font-family: monospace; margin-bottom: 14px; }
    .modal .desc { font-size: 13px; color: var(--muted); line-height: 1.6; margin-bottom: 20px; }
    .modal .meta-row { display: flex; gap: 20px; margin-bottom: 20px; flex-wrap: wrap; }
    .modal .meta-item { font-size: 12px; color: var(--muted); }
    .modal .meta-item strong { color: var(--text); font-size: 14px; display: block; }
    .cmd-block { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px; margin-bottom: 10px; }
    .cmd-label { font-size: 11px; color: var(--muted); margin-bottom: 6px; }
    .cmd-text { font-family: monospace; font-size: 12px; color: var(--text); word-break: break-all; }
    .copy-btn { background: var(--accent); border: none; border-radius: 6px; color: #fff; padding: 9px 20px; font-size: 13px; cursor: pointer; width: 100%; margin-top: 6px; transition: opacity 0.2s; }
    .copy-btn:hover { opacity: 0.85; }
    .copy-btn.copied { background: var(--accent2); }
    .ext-link { display: inline-flex; align-items: center; gap: 5px; color: var(--accent2); font-size: 13px; text-decoration: none; margin-top: 12px; }
    .ext-link:hover { text-decoration: underline; }

    /* Mobile bottom nav */
    @media (max-width: 768px) {
      .mobile-tabs { display: flex; position: fixed; bottom: 0; left: 0; right: 0; background: rgba(15,17,23,0.97); border-top: 1px solid var(--border); z-index: 150; backdrop-filter: blur(12px); overflow-x: auto; }
      .mobile-tabs::-webkit-scrollbar { display: none; }
      .mobile-tab-btn { flex: 0 0 auto; background: none; border: none; color: var(--muted); font-size: 11px; padding: 10px 14px; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 3px; border-top: 2px solid transparent; }
      .mobile-tab-btn.active { color: var(--accent); border-top-color: var(--accent); }
      .source-tabs { display: none; }
    }
    @media (min-width: 769px) { .mobile-tabs { display: none; } }
  </style>

<body>

<header>
  <div class="logo">🔧 Skills Hub</div>
  <div class="search-wrap">
    <span class="si">🔍</span>
    <input type="text" id="search" placeholder="搜索 skill… (⌘K)" autocomplete="off" />
    <span class="search-shortcut" id="shortcutHint">⌘K</span>
  </div>
  <div class="hdr-right">
    <span class="stats-badge" id="statsText"></span>
    <span class="built-at" id="builtAt"></span>
  </div>
</header>

<div class="source-tabs" id="sourceTabs">
  <button class="tab-btn active" data-src="clawhub">☁️ ClawHub <span class="tab-badge" id="cnt-clawhub"></span></button>
  <button class="tab-btn" data-src="github">🐙 GitHub <span class="tab-badge" id="cnt-github"></span></button>
  <button class="tab-btn" data-src="skillssh">🛠 skills.sh <span class="tab-badge" id="cnt-skillssh"></span></button>

</div>

<div class="container">
  <aside class="sidebar">
    <h3>分类</h3>
    <ul class="filter-list" id="catList"></ul>
    <h3>排序</h3>
    <ul class="filter-list" id="sortList">
      <li><button class="active" data-sort="default">默认</button></li>
      <li><button data-sort="stars">⭐ 星标最多</button></li>
      <li><button data-sort="downloads">↓ 下载最多</button></li>
      <li><button data-sort="name">A-Z 名称</button></li>
    </ul>
  </aside>
  <main>
    <div class="grid" id="grid"></div>
  </main>
</div>

<!-- Mobile bottom tabs -->
<div class="mobile-tabs" id="mobileTabs">
  <button class="mobile-tab-btn active" data-src="clawhub">☁️<span>ClawHub</span></button>
  <button class="mobile-tab-btn" data-src="github">🐙<span>GitHub</span></button>
  <button class="mobile-tab-btn" data-src="skillssh">🛠<span>skills.sh</span></button>

</div>

<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div id="modalContent"></div>
  </div>
</div>

<script>
const STATIC_DATA = JSON.parse(document.getElementById('sd').textContent);

let curSrc = 'clawhub';
let curSort = 'default';
let curCat = 'all';
let search = '';
let searchTimer = null;

const srcMeta = {
  clawhub:  { pill: 'src-clawhub',  label: 'ClawHub' },
  github:   { pill: 'src-github',   label: 'GitHub'  },
  skillssh: { pill: 'src-skillssh', label: 'skills.sh' },
  local:    { pill: 'src-local',    label: '已安装' },
};

function fuzzyMatch(str, query) {
  str = str.toLowerCase(); query = query.toLowerCase();
  let si = 0;
  for (const c of query) { si = str.indexOf(c, si) + 1; if (!si) return false; }
  return true;
}

function getItems() {
  const raw = (STATIC_DATA[curSrc] || []).slice();
  const q = search.trim();

  let items = q
    ? raw.filter(s => fuzzyMatch(s.name + ' ' + s.desc + ' ' + s.slug, q))
    : raw;

  if (curCat !== 'all') items = items.filter(s => s.category === curCat);

  if (curSort === 'stars')     items = [...items].sort((a,b) => b.stars - a.stars);
  else if (curSort === 'downloads') items = [...items].sort((a,b) => b.downloads - a.downloads);
  else if (curSort === 'name') items = [...items].sort((a,b) => a.name.localeCompare(b.name));

  return items;
}

function getAllCats() {
  const raw = STATIC_DATA[curSrc] || [];
  const counts = {};
  raw.forEach(s => { counts[s.category || '📦 其他'] = (counts[s.category || '📦 其他'] || 0) + 1; });
  return Object.entries(counts).sort((a,b) => b[1] - a[1]);
}

function buildCatList() {
  const cats = getAllCats();
  const total = (STATIC_DATA[curSrc] || []).length;
  const list = document.getElementById('catList');
  list.innerHTML = `<li><button class="${curCat === 'all' ? 'active' : ''}" data-cat="all">全部 <span class="filter-count">${total}</span></button></li>` +
    cats.map(([cat, cnt]) =>
      `<li><button class="${curCat === cat ? 'active' : ''}" data-cat="${esc(cat)}">${esc(cat)} <span class="filter-count">${cnt}</span></button></li>`
    ).join('');
}

function render() {
  const items = getItems();
  const total = (STATIC_DATA[curSrc] || []).length;
  const grid = document.getElementById('grid');
  document.getElementById('statsText').textContent = `${items.length} / ${total} skills`;

  if (!items.length) {
    grid.innerHTML = `<div class="no-results">没有找到相关 skill 🤔</div>`;
    return;
  }

  // store items for click lookup
  window._cardItems = items;
  grid.innerHTML = items.map((s, i) => {
    const m = srcMeta[s.source] || srcMeta.github;
    const isLocal = s.source === 'local';
    return `<div class="card${isLocal ? ' local' : ''}" data-idx="${i}">
      <div class="card-head">
        <div class="card-name">${isLocal ? '✅ ' : ''}${esc(s.name)}</div>
        <div class="card-meta">
          ${s.stars > 0 ? `<span class="card-star">⭐ ${fmt(s.stars)}</span>` : ''}
          <span class="source-pill ${m.pill}">${m.label}</span>
        </div>
      </div>
      ${s.category ? `<div><span class="cat-badge">${esc(s.category)}</span></div>` : ''}
      <div class="card-summary">${esc(s.desc)}</div>
      <div class="card-footer">
        <span class="card-slug" title="${esc(s.slug)}">${esc(s.slug)}</span>
        ${s.downloads > 0 ? `<span class="card-dl">↓ ${fmt(s.downloads)}</span>` : ''}
      </div>
    </div>`;
  }).join('');
  grid.onclick = e => {
    const card = e.target.closest('[data-idx]');
    if (card) showDetail(window._cardItems[+card.dataset.idx]);
  };
}

function showDetail(s) {
  window._detailSkill = s;
  const m = srcMeta[s.source] || srcMeta.github;
  let cmds = '';
  if (s.source === 'clawhub') {
    cmds = `
      <div class="cmd-block"><div class="cmd-label">官方源安装</div><div class="cmd-text">${esc(s.installOfficial)}</div></div>
      <div class="cmd-block"><div class="cmd-label">镜像安装（国内加速）</div><div class="cmd-text">${esc(s.install)}</div></div>
      <button class="copy-btn" onclick="copyDetail('install')">📋 复制镜像安装命令</button>`;
  } else if (s.source === 'local') {
    cmds = `
      <div class="cmd-block" style="border-color:var(--accent2)"><div class="cmd-label">✅ 已安装在本地</div><div class="cmd-text">/home/void/.openclaw/workspace/skills/${esc(s.slug)}/</div></div>
      <button class="copy-btn" style="background:var(--accent2)" onclick="copyDetail('installOfficial')">📋 复制 clawhub 安装命令</button>`;
  } else if (s.source === 'skillssh') {
    cmds = `
      <div class="cmd-block"><div class="cmd-label">skills.sh 安装</div><div class="cmd-text">${esc(s.install)}</div></div>
      <button class="copy-btn" onclick="copyDetail('install')">📋 复制安装命令</button>`;
  } else {
    cmds = `
      <div class="cmd-block"><div class="cmd-label">克隆仓库</div><div class="cmd-text">${esc(s.install)}</div></div>
      <button class="copy-btn" onclick="copyDetail('url')">📋 复制仓库链接</button>`;
  }

  document.getElementById('modalContent').innerHTML = `
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px;flex-wrap:wrap">
      <h2 style="flex:1">${s.source==='local'?'✅ ':''}${esc(s.name)}</h2>
      <span class="source-pill ${m.pill}">${m.label}</span>
      ${s.category ? `<span class="cat-badge">${esc(s.category)}</span>` : ''}
    </div>
    <div class="slug">${esc(s.slug)}</div>
    <div class="desc">${esc(s.desc)}</div>
    <div class="meta-row">
      ${s.stars > 0 ? `<div class="meta-item"><strong>⭐ ${fmt(s.stars)}</strong>星标</div>` : ''}
      ${s.downloads > 0 ? `<div class="meta-item"><strong>↓ ${fmt(s.downloads)}</strong>下载</div>` : ''}
      ${s.version ? `<div class="meta-item"><strong>${esc(s.version)}</strong>版本</div>` : ''}
    </div>
    ${cmds}
    <a class="ext-link" href="${esc(s.url)}" target="_blank" rel="noopener">🔗 在原站查看 ↗</a>
  `;
  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal(e) {
  if (!e || e.target === document.getElementById('modalOverlay'))
    document.getElementById('modalOverlay').classList.remove('open');
}

async function copyDetail(field) {
  const s = window._detailSkill;
  if (!s) return;
  const text = s[field] || s.url || '';
  const btn = event.target;
  try {
    await navigator.clipboard.writeText(text);
    const orig = btn.textContent;
    btn.textContent = '✅ 已复制';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = orig; btn.classList.remove('copied'); }, 2000);
  } catch {}
}

async function copyText(text, btn) {
  try {
    await navigator.clipboard.writeText(text);
    const orig = btn.textContent;
    btn.textContent = '✅ 已复制';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = orig; btn.classList.remove('copied'); }, 2000);
  } catch {}
}

function fmt(n) { return n >= 1000 ? (n/1000).toFixed(1)+'k' : String(n); }
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function switchTab(src) {
  curSrc = src; curCat = 'all';
  document.querySelectorAll('[data-src]').forEach(b => b.classList.toggle('active', b.dataset.src === src));
  // update counts
  ['clawhub','github','skillssh'].forEach(k => {
    const el = document.getElementById('cnt-'+k);
    if (el) el.textContent = (STATIC_DATA[k]||[]).length;
  });
  buildCatList();
  render();
}

function init() {
  // shortcut hint
  const isMac = /Mac|iPhone|iPad/.test(navigator.platform);
  document.getElementById('shortcutHint').textContent = isMac ? '⌘K' : 'Ctrl+K';

  // built at
  if (STATIC_DATA.builtAt) {
    const d = new Date(STATIC_DATA.builtAt);
    document.getElementById('builtAt').textContent =
      `数据: ${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  }

  switchTab('clawhub');
}

// Events
document.getElementById('search').addEventListener('input', e => {
  search = e.target.value;
  clearTimeout(searchTimer);
  searchTimer = setTimeout(render, 180);
});

document.getElementById('sourceTabs').addEventListener('click', e => {
  const btn = e.target.closest('[data-src]');
  if (btn) switchTab(btn.dataset.src);
});

document.getElementById('mobileTabs').addEventListener('click', e => {
  const btn = e.target.closest('[data-src]');
  if (btn) switchTab(btn.dataset.src);
});

document.getElementById('catList').addEventListener('click', e => {
  const btn = e.target.closest('button[data-cat]');
  if (!btn) return;
  curCat = btn.dataset.cat;
  document.querySelectorAll('#catList button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
});

document.getElementById('sortList').addEventListener('click', e => {
  const btn = e.target.closest('button[data-sort]');
  if (!btn) return;
  curSort = btn.dataset.sort;
  document.querySelectorAll('#sortList button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
});

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
  if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
    e.preventDefault();
    document.getElementById('search').focus();
  }
});

init();
</script>
</body>
