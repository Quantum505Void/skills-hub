<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Skills Hub — OpenClaw Skills 导航</title>
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --border: #2a2d3a;
      --accent: #6c63ff;
      --accent2: #00d4aa;
      --text: #e8e9f0;
      --muted: #8b8fa8;
      --tag-bg: #252837;
      --card-hover: #20233a;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
    }

    /* Header */
    header {
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      display: flex;
      align-items: center;
      gap: 16px;
      height: 60px;
      position: sticky;
      top: 0;
      background: rgba(15,17,23,0.95);
      backdrop-filter: blur(12px);
      z-index: 100;
    }
    .logo {
      font-size: 18px;
      font-weight: 700;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      white-space: nowrap;
    }
    .search-wrap {
      flex: 1;
      max-width: 480px;
      position: relative;
    }
    .search-wrap input {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 14px 8px 36px;
      color: var(--text);
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }
    .search-wrap input:focus { border-color: var(--accent); }
    .search-wrap .icon {
      position: absolute;
      left: 11px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      font-size: 15px;
    }
    .stats-badge {
      margin-left: auto;
      color: var(--muted);
      font-size: 13px;
      white-space: nowrap;
    }
    .mirror-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 6px 12px;
      color: var(--muted);
      font-size: 12px;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.2s;
    }
    .mirror-btn:hover { border-color: var(--accent2); color: var(--accent2); }

    /* Main layout */
    .container {
      max-width: 1280px;
      margin: 0 auto;
      padding: 24px;
      display: grid;
      grid-template-columns: 200px 1fr;
      gap: 24px;
    }
    @media (max-width: 768px) {
      .container { grid-template-columns: 1fr; }
      .sidebar { display: none; }
    }

    /* Sidebar */
    .sidebar { position: sticky; top: 84px; height: fit-content; }
    .sidebar h3 {
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }
    .sort-list { list-style: none; margin-bottom: 24px; }
    .sort-list li button {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 13px;
      cursor: pointer;
      padding: 5px 8px;
      border-radius: 6px;
      width: 100%;
      text-align: left;
      transition: all 0.15s;
    }
    .sort-list li button:hover { background: var(--tag-bg); color: var(--text); }
    .sort-list li button.active { background: var(--tag-bg); color: var(--accent); }

    /* Grid */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 18px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .card:hover {
      border-color: var(--accent);
      background: var(--card-hover);
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(108,99,255,0.15);
    }
    .card-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
    }
    .card-name {
      font-size: 14px;
      font-weight: 600;
      line-height: 1.3;
      flex: 1;
    }
    .card-stars {
      display: flex;
      align-items: center;
      gap: 4px;
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }
    .card-summary {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .card-footer {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: auto;
      flex-wrap: wrap;
    }
    .card-slug {
      font-size: 11px;
      color: var(--accent2);
      font-family: monospace;
      background: rgba(0,212,170,0.08);
      padding: 2px 7px;
      border-radius: 4px;
    }
    .card-dl {
      margin-left: auto;
      font-size: 11px;
      color: var(--muted);
    }

    /* Loading / empty */
    .loading {
      grid-column: 1/-1;
      text-align: center;
      color: var(--muted);
      padding: 60px;
      font-size: 14px;
    }
    .spinner {
      display: inline-block;
      width: 20px; height: 20px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Load more */
    .load-more {
      grid-column: 1/-1;
      text-align: center;
      padding: 16px;
    }
    .load-more button {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      padding: 10px 28px;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .load-more button:hover { border-color: var(--accent); color: var(--accent); }

    /* Modal */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 200;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      max-width: 560px;
      width: 100%;
      max-height: 80vh;
      overflow-y: auto;
      padding: 28px;
      position: relative;
    }
    .modal-close {
      position: absolute;
      top: 16px; right: 16px;
      background: var(--tag-bg);
      border: none;
      color: var(--muted);
      width: 28px; height: 28px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .modal-close:hover { color: var(--text); }
    .modal h2 { font-size: 18px; margin-bottom: 6px; }
    .modal .slug { font-size: 12px; color: var(--accent2); font-family: monospace; margin-bottom: 14px; }
    .modal .desc { font-size: 13px; color: var(--muted); line-height: 1.6; margin-bottom: 20px; }
    .modal .meta-row { display: flex; gap: 24px; margin-bottom: 20px; flex-wrap: wrap; }
    .modal .meta-item { font-size: 12px; color: var(--muted); }
    .modal .meta-item strong { color: var(--text); font-size: 14px; display: block; }
    .cmd-block {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px 16px;
      margin-bottom: 12px;
    }
    .cmd-label { font-size: 11px; color: var(--muted); margin-bottom: 6px; }
    .cmd-text {
      font-family: monospace;
      font-size: 12px;
      color: var(--text);
      word-break: break-all;
    }
    .copy-btn {
      background: var(--accent);
      border: none;
      border-radius: 6px;
      color: #fff;
      padding: 8px 20px;
      font-size: 13px;
      cursor: pointer;
      width: 100%;
      margin-top: 4px;
      transition: opacity 0.2s;
    }
    .copy-btn:hover { opacity: 0.85; }
    .copy-btn.copied { background: var(--accent2); }
  </style>
</head>
<body>

<header>
  <div class="logo">🔧 Skills Hub</div>
  <div class="search-wrap">
    <span class="icon">🔍</span>
    <input type="text" id="search" placeholder="搜索 skill 名称、描述..." autocomplete="off" />
  </div>
  <span class="stats-badge" id="statsText">加载中…</span>
  <button class="mirror-btn" onclick="copyMirror()">📋 复制镜像地址</button>
</header>

<div class="container">
  <aside class="sidebar">
    <h3>排序</h3>
    <ul class="sort-list" id="sortList">
      <li><button class="active" data-sort="updatedAt">最近更新</button></li>
      <li><button data-sort="downloads">下载最多</button></li>
      <li><button data-sort="stars">星标最多</button></li>
      <li><button data-sort="createdAt">最新发布</button></li>
    </ul>
  </aside>

  <main>
    <div class="grid" id="grid">
      <div class="loading">
        <div class="spinner"></div>
        <div>正在加载 skills…</div>
      </div>
    </div>
  </main>
</div>

<!-- Detail Modal -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div id="modalContent"></div>
  </div>
</div>

<script>
const PROXY = 'https://xiaoxin-clawhub-mirror.moke521-wang.workers.dev';
const PAGE_SIZE = 48;

let allItems = [];
let cursor = null;
let hasMore = true;
let loading = false;
let sort = 'updatedAt';
let searchQ = '';
let searchTimer = null;

async function fetchSkills(reset = false) {
  if (loading || (!hasMore && !reset)) return;
  loading = true;

  if (reset) {
    allItems = [];
    cursor = null;
    hasMore = true;
    document.getElementById('grid').innerHTML = `
      <div class="loading"><div class="spinner"></div><div>正在加载 skills…</div></div>`;
  }

  try {
    let url = `${PROXY}/api/v1/skills?limit=${PAGE_SIZE}&orderBy=${sort}`;
    if (cursor) url += `&cursor=${encodeURIComponent(cursor)}`;
    if (searchQ) url += `&search=${encodeURIComponent(searchQ)}`;

    const res = await fetch(url);
    const data = await res.json();
    const items = data.items || [];
    cursor = data.nextCursor || null;
    hasMore = !!cursor;

    allItems = reset ? items : [...allItems, ...items];
    renderGrid();
  } catch(e) {
    document.getElementById('grid').innerHTML =
      `<div class="loading" style="color:#ff6b6b">加载失败，请刷新重试<br><small>${e.message}</small></div>`;
  }
  loading = false;
}

function renderGrid() {
  const grid = document.getElementById('grid');
  const cards = allItems.map(skill => cardHTML(skill)).join('');
  const more = hasMore
    ? `<div class="load-more"><button onclick="fetchSkills()">加载更多</button></div>`
    : '';
  grid.innerHTML = cards + more;
  document.getElementById('statsText').textContent =
    `共 ${allItems.length} 个 skill${hasMore ? '+' : ''}`;
}

function cardHTML(s) {
  const dl = s.stats?.downloads || 0;
  const stars = s.stats?.stars || 0;
  return `<div class="card" onclick='showDetail(${JSON.stringify(s).replace(/'/g,"&#39;")})'>
    <div class="card-head">
      <div class="card-name">${esc(s.displayName || s.slug)}</div>
      ${stars > 0 ? `<div class="card-stars">⭐ ${stars}</div>` : ''}
    </div>
    <div class="card-summary">${esc(s.summary || '暂无描述')}</div>
    <div class="card-footer">
      <span class="card-slug">${esc(s.slug)}</span>
      ${dl > 0 ? `<span class="card-dl">↓ ${dl}</span>` : ''}
    </div>
  </div>`;
}

function showDetail(s) {
  const dl = s.stats?.downloads || 0;
  const stars = s.stats?.stars || 0;
  const ver = s.latestVersion?.version || '-';
  const installCmd = `CLAWHUB_REGISTRY=${PROXY} clawhub install ${s.slug} --force`;
  const mirrorCmd = `CLAWHUB_REGISTRY=${PROXY} clawhub install ${s.slug}`;

  document.getElementById('modalContent').innerHTML = `
    <h2>${esc(s.displayName || s.slug)}</h2>
    <div class="slug">${esc(s.slug)}</div>
    <div class="desc">${esc(s.summary || '暂无描述')}</div>
    <div class="meta-row">
      <div class="meta-item"><strong>${ver}</strong>最新版本</div>
      <div class="meta-item"><strong>${dl}</strong>下载次数</div>
      <div class="meta-item"><strong>${stars}</strong>⭐ 星标</div>
    </div>
    <div class="cmd-block">
      <div class="cmd-label">安装命令（官方源）</div>
      <div class="cmd-text">clawhub install ${esc(s.slug)}</div>
    </div>
    <div class="cmd-block">
      <div class="cmd-label">安装命令（小新镜像，国内加速）</div>
      <div class="cmd-text">${esc(mirrorCmd)}</div>
    </div>
    <button class="copy-btn" id="copyInstall" onclick="copyCmd('${esc(mirrorCmd)}')">
      📋 复制镜像安装命令
    </button>
  `;
  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal(e) {
  if (!e || e.target === document.getElementById('modalOverlay')) {
    document.getElementById('modalOverlay').classList.remove('open');
  }
}

async function copyCmd(cmd) {
  await navigator.clipboard.writeText(cmd);
  const btn = document.getElementById('copyInstall');
  btn.textContent = '✅ 已复制';
  btn.classList.add('copied');
  setTimeout(() => { btn.textContent = '📋 复制镜像安装命令'; btn.classList.remove('copied'); }, 2000);
}

async function copyMirror() {
  await navigator.clipboard.writeText(PROXY);
  const btn = document.querySelector('.mirror-btn');
  const orig = btn.textContent;
  btn.textContent = '✅ 已复制';
  setTimeout(() => btn.textContent = orig, 2000);
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Search
document.getElementById('search').addEventListener('input', e => {
  searchQ = e.target.value.trim();
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => fetchSkills(true), 350);
});

// Sort
document.getElementById('sortList').addEventListener('click', e => {
  const btn = e.target.closest('button');
  if (!btn) return;
  sort = btn.dataset.sort;
  document.querySelectorAll('.sort-list button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  fetchSkills(true);
});

// ESC to close
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

// Init
fetchSkills(true);
</script>
</body>
</html>
